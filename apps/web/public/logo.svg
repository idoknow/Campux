<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="336" height="336" viewBox="0 0 336 336" role="img" aria-labelledby="title desc">
  <title id="title">Campux logo</title>
  <desc id="desc">Campux logo with two quadrilateral background shapes and the Campux wordmark in front; the letter p has a hollow counter.</desc>
  <defs>
    <style>
      .bg-blue { fill: #0072D3; }
      .bg-cyan { fill: #27D7FF; }
      .wordmark-blue { fill: #0190D5; }
      .wordmark-white { fill: #FFFFFF; }
    </style>
  </defs>

  <g id="background">
    <polygon id="background-blue-quadrilateral" class="bg-blue" points="65,71 119,71 106,199 52,199"/>
    <polygon id="background-cyan-quadrilateral" class="bg-cyan" points="115,127 169,127 156,255 102,255"/>
  </g>

  <g id="foreground-wordmark">
    <path id="campux-blue-xux" class="wordmark-blue" d="M 266 154 L 265 155 L 272 168 L 263 181 L 263 183 L 270 183 L 275 178 L 278 180 L 279 183 L 287 183 L 288 182 L 284 175 L 282 167 L 291 155 L 282 154 L 278 160 L 274 154 Z M 229 154 L 226 182 L 243 180 L 245 183 L 253 183 L 256 164 L 256 154 L 247 154 L 244 175 L 236 174 L 238 154 Z M 144 154 L 141 183 L 149 183 L 151 166 L 153 160 L 158 161 L 155 183 L 163 183 L 166 160 L 172 161 L 169 182 L 177 183 L 180 164 L 180 154 Z"/>
    <path id="campux-blue-p" class="wordmark-blue" fill-rule="evenodd" d="M 219 154 L 192 154 L 191 155 L 192 158 L 187 192 L 188 198 L 196 198 L 199 183 L 214 183 L 216 181 L 218 172 Z M 202 160 L 209 161 L 208 175 L 206 178 L 199 177 L 200 165 Z"/>
    <path id="campux-white-ca" class="wordmark-white" fill-rule="evenodd" d="M 106 154 L 105 162 L 115 162 L 116 160 L 121 160 L 122 165 L 121 166 L 105 166 L 103 181 L 105 183 L 132 183 L 130 181 L 130 173 L 133 154 Z M 113 176 L 115 172 L 120 173 L 119 177 Z M 63 144 L 59 173 L 59 182 L 61 183 L 93 183 L 94 175 L 92 177 L 70 177 L 69 176 L 71 153 L 73 150 L 96 150 L 97 144 Z"/>
  </g>
</svg>
