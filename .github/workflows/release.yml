name: Release Binaries

# 打标签 `v*`（如 v1.2.3）或手动触发时，为各 OS/架构构建自包含单可执行文件并发布到 GitHub Release。
#
# ⚠️ 原生插件（Prisma 引擎 / sharp / argon2）按平台编译，无法跨平台交叉编译，
#    因此每个目标在「对应架构的原生 runner」上构建——这是本矩阵存在的根本原因。
#
# 产物（每个目标）：
#   - campux-<os>-<arch>[.exe]          自包含可执行文件
#   - campux-<os>-<arch>[.exe].sha256   校验和
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 v1.2.3-test）；留空则用 git describe"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-x64
            runner: macos-13
          - target: darwin-arm64
            runner: macos-14
          - target: windows-x64
            runner: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            version="${{ github.event.inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

      - name: Install dependencies
        shell: bash
        run: bun install --frozen-lockfile

      - name: Build standalone binary
        shell: bash
        env:
          CAMPUX_BUILD_VERSION: ${{ steps.ver.outputs.version }}
        run: bun run scripts/build-release.ts --version "${{ steps.ver.outputs.version }}" --out release

      - name: Smoke test (binary starts & reports version)
        if: matrix.target == 'linux-x64' || matrix.target == 'linux-arm64' || startsWith(matrix.target, 'darwin')
        shell: bash
        run: |
          # 无 DATABASE_URL 时跳过迁移，期望 server 因缺库连接失败而退出——
          # 但「能跑到迁移/启动逻辑」即证明二进制本身可执行、原生插件已就绪。
          set +e
          out="$(CAMPUX_SKIP_AUTO_MIGRATE=1 CAMPUX_SERVER_PORT=18999 \
                 DATABASE_URL='postgresql://invalid:invalid@127.0.0.1:1/x' \
                 timeout 12 ./release/campux-${{ matrix.target }} 2>&1)"
          echo "$out" | head -40
          # 只要看到 standalone 启动日志即说明二进制可执行（数据库连接失败是预期的）
          echo "$out" | grep -q "campux standalone starting" && echo "SMOKE_OK" || { echo "SMOKE_FAIL"; exit 1; }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: campux-${{ matrix.target }}
          path: |
            release/campux-${{ matrix.target }}*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # 仅在打了 tag 时创建/更新 GitHub Release；手动 dispatch 只产出 artifacts。
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        shell: bash
        run: |
          find dist -type f | sort
          echo "---- 合并所有 sha256 为一个 SHA256SUMS ----"
          (cd dist && cat *.sha256 2>/dev/null > SHA256SUMS || true)
          cat dist/SHA256SUMS 2>/dev/null || echo "(no sha256 files)"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Campux ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ## Campux ${{ github.ref_name }} — 自包含单可执行文件

            每个文件都内嵌了前端产物、SVG 头像、数据库迁移、Prisma 查询引擎与原生依赖，
            **运行时只需要一个可达的 PostgreSQL**。

            | 平台 | 文件 |
            | --- | --- |
            | Linux x64 | `campux-linux-x64` |
            | Linux arm64 | `campux-linux-arm64` |
            | macOS x64 (Intel) | `campux-darwin-x64` |
            | macOS arm64 (Apple Silicon) | `campux-darwin-arm64` |
            | Windows x64 | `campux-windows-x64.exe` |

            ### 快速开始
            ```bash
            export DATABASE_URL="postgresql://user:pass@host:5432/campux"
            chmod +x campux-linux-x64
            ./campux-linux-x64
            ```
            启动时会自动执行内嵌的数据库迁移，然后在 `:8989`（可用 `CAMPUX_SERVER_PORT` 调整）提供服务。

            完整部署说明见 [docs.campux.top](https://docs.campux.top)。可选的图片压缩 / 说说配图渲染分别需要
            系统级 `sharp` 库与 Chromium —— 见文档「单文件部署」一节。

            校验：`sha256sum -c SHA256SUMS`
          files: |
            dist/campux-*
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
