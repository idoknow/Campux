name: Release Binaries

# 打标签 `v*`（如 v1.2.3）或手动触发时，为各 OS/架构构建自包含单可执行文件并发布到 GitHub Release。
#
# ⚠️ 原生插件（Prisma 引擎 / sharp / argon2）按平台编译，无法跨平台交叉编译，
#    因此每个目标在「对应架构的原生 runner」上构建——这是本矩阵存在的根本原因。
#
# 产物（每个目标）：
#   - campux-<os>-<arch>[.exe]          自包含可执行文件
#   - campux-<os>-<arch>[.exe].sha256   校验和
#
# 关于 darwin-x64（macOS Intel / macos-13）：该 runner 在本账号下经常长时间排队/缺货。
# 为了不让它卡住整条发布，它被拆成一个**独立、非必需**的 job（release 不 `needs` 它）。
# 它若赶上构建完会被一并发布；若排队/失败，其余 4 个平台照常发布。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（如 v1.2.3-test）；留空则用 git describe"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  resolve-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: ver
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            version="${{ github.event.inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

  # ── 必需平台：全部成功才算 release 的前置就绪 ─────────────────
  build:
    name: Build ${{ matrix.target }}
    needs: resolve-version
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-arm64
            runner: macos-14
          - target: windows-x64
            runner: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-binary
        with:
          target: ${{ matrix.target }}
          version: ${{ needs.resolve-version.outputs.version }}

  # ── darwin-x64（Intel）：独立、非必需，runner 稀缺不阻塞发布 ──
  build-darwin-x64:
    name: Build darwin-x64 (best-effort)
    needs: resolve-version
    runs-on: macos-13
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/build-binary
        with:
          target: darwin-x64
          version: ${{ needs.resolve-version.outputs.version }}

  release:
    name: Publish Release
    # 只 `needs` 必需平台；darwin-x64 不在其中，所以它排队/失败都不会拖住发布。
    # download-artifact 会把已上传的 darwin-x64 产物（若赶上了）一并带进来。
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts & require at least one binary
        shell: bash
        run: |
          find dist -type f | sort
          echo "---- 合并所有 sha256 为一个 SHA256SUMS ----"
          (cd dist && cat *.sha256 2>/dev/null > SHA256SUMS || true)
          cat dist/SHA256SUMS 2>/dev/null || echo "(no sha256 files)"
          count="$(find dist -type f -name 'campux-*' ! -name '*.sha256' | wc -l | tr -d ' ')"
          echo "binary artifacts: $count"
          if [ "$count" -eq 0 ]; then
            echo "::error::没有任何平台构建成功,中止发布"
            exit 1
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Campux ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          body: |
            ## Campux ${{ github.ref_name }} — 自包含单可执行文件

            每个文件都内嵌了前端产物、SVG 头像、数据库迁移、Prisma 查询引擎与原生依赖，
            **运行时只需要一个可达的 PostgreSQL**。

            | 平台 | 文件 |
            | --- | --- |
            | Linux x64 | `campux-linux-x64` |
            | Linux arm64 | `campux-linux-arm64` |
            | macOS x64 (Intel) | `campux-darwin-x64` |
            | macOS arm64 (Apple Silicon) | `campux-darwin-arm64` |
            | Windows x64 | `campux-windows-x64.exe` |

            > macOS Intel（`darwin-x64`）由独立的 best-effort 任务构建，偶尔会因 runner 排队
            > 未能赶上本次发布；如缺失可在 Actions 重跑或用 `bun run build:binary` 自行构建。

            ### 快速开始
            ```bash
            export DATABASE_URL="postgresql://user:***@host:5432/campux"
            chmod +x campux-linux-x64
            ./campux-linux-x64
            ```
            启动时会自动执行内嵌的数据库迁移，然后在 `:8989`（可用 `CAMPUX_SERVER_PORT` 调整）提供服务。

            完整部署说明见 [docs.campux.top](https://docs.campux.top)。可选的图片压缩 / 说说配图渲染分别需要
            系统级 `sharp` 库与 Chromium —— 见文档「单文件部署」一节。

            校验：`sha256sum -c SHA256SUMS`
          files: |
            dist/campux-*
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
