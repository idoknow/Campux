name: Docker Image

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Docker tag
        id: meta
        shell: bash
        run: |
          raw_tag="${GITHUB_REF_NAME}"
          tag="$(printf '%s' "$raw_tag" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-128)"
          if [ -z "$tag" ]; then
            tag="${GITHUB_SHA::12}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image=rockchin/campux:$tag" >> "$GITHUB_OUTPUT"
          echo "dash_image=rockchin/campux-dash:$tag" >> "$GITHUB_OUTPUT"
          echo "landing_image=rockchin/campux-landing:$tag" >> "$GITHUB_OUTPUT"
          echo "build_version=$tag-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # GitHub Actions runner 到 registry-1.docker.io 偶发超时，
          # 配置国内镜像加速 + daemon 级重试。
          driver-opts: |
            image=moby/buildkit:latest
            network=host
          buildkitd-flags: --debug

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push branch image
        uses: docker/build-push-action@v6
        continue-on-error: true
        id: build_main
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          build-args: |
            CAMPUX_BUILD_VERSION=${{ steps.meta.outputs.build_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Retry build on failure
        if: steps.build_main.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          build-args: |
            CAMPUX_BUILD_VERSION=${{ steps.meta.outputs.build_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 重试时禁用 provenance attestation 减少 registry 交互
          provenance: false
          sbom: false

      - name: Build and push telemetry dash image
        uses: docker/build-push-action@v6
        continue-on-error: true
        id: build_dash
        with:
          context: .
          file: apps/dash/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.dash_image }}
          cache-from: type=gha,scope=dash
          cache-to: type=gha,mode=max,scope=dash

      - name: Retry dash build on failure
        if: steps.build_dash.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/dash/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.dash_image }}
          cache-from: type=gha,scope=dash
          cache-to: type=gha,mode=max,scope=dash
          provenance: false
          sbom: false

      - name: Build and push landing image
        uses: docker/build-push-action@v6
        continue-on-error: true
        id: build_landing
        with:
          context: .
          file: landing/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.landing_image }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing

      - name: Retry landing build on failure
        if: steps.build_landing.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: landing/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.landing_image }}
          cache-from: type=gha,scope=landing
          cache-to: type=gha,mode=max,scope=landing
          provenance: false
          sbom: false

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/deploy/prod'
    env:
      CAMPUX_IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
    steps:
      - name: Redeploy production stack
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_USERNAME: ${{ secrets.PORTAINER_USERNAME }}
          PORTAINER_PASSWORD: ${{ secrets.PORTAINER_PASSWORD }}
          PORTAINER_STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
          PORTAINER_REPOSITORY_USERNAME: ${{ secrets.PORTAINER_REPOSITORY_USERNAME }}
          PORTAINER_REPOSITORY_PASSWORD: ${{ secrets.PORTAINER_REPOSITORY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          : "${PORTAINER_URL:?PORTAINER_URL secret is required}"
          : "${PORTAINER_USERNAME:?PORTAINER_USERNAME secret is required}"
          : "${PORTAINER_PASSWORD:?PORTAINER_PASSWORD secret is required}"
          : "${PORTAINER_REPOSITORY_USERNAME:?PORTAINER_REPOSITORY_USERNAME secret is required}"
          : "${PORTAINER_REPOSITORY_PASSWORD:?PORTAINER_REPOSITORY_PASSWORD secret is required}"

          stack_id="${PORTAINER_STACK_ID:-96}"
          endpoint_id="${PORTAINER_ENDPOINT_ID:-10}"
          portainer_url="${PORTAINER_URL%/}"

          # 认证
          jwt="$(
            jq -n \
              --arg username "$PORTAINER_USERNAME" \
              --arg password "$PORTAINER_PASSWORD" \
              '{Username: $username, Password: $password}' \
            | curl -fsS \
                -X POST "$portainer_url/api/auth" \
                -H 'Content-Type: application/json' \
                --data-binary @- \
            | jq -r '.jwt'
          )"

          if [ -z "$jwt" ] || [ "$jwt" = "null" ]; then
            echo "Failed to authenticate to Portainer" >&2
            exit 1
          fi

          # 先查询 stack 信息，确认存在并获取配置
          echo "--- Fetching stack info ---" >&2
          if ! stack_info="$(curl -sS \
            -X GET "$portainer_url/api/stacks/$stack_id?endpointId=$endpoint_id" \
            -H "Authorization: Bearer $jwt" 2>&1)"; then
            echo "Failed to fetch stack info. Check stack_id ($stack_id) and endpoint_id ($endpoint_id)." >&2
            echo "$stack_info" >&2
            exit 1
          fi
          echo "Stack name: $(printf '%s' "$stack_info" | jq -r '.Name // "unknown"')" >&2
          echo "Stack type: $(printf '%s' "$stack_info" | jq -r '.Type // "unknown"')" >&2

          # Preserve the stack's existing environment variables (e.g. the
          # Cloudflare API token for tenant-subdomain automation, which is set
          # in the Portainer stack env and must NOT be wiped on every deploy).
          # We merge CAMPUX_IMAGE_TAG on top of whatever is already stored.
          existing_env="$(printf '%s' "$stack_info" | jq -c '.Env // []')"

          # 构造 redeploy payload
          redeploy_payload="$(
            jq -n \
              --arg repositoryUsername "$PORTAINER_REPOSITORY_USERNAME" \
              --arg repositoryPassword "$PORTAINER_REPOSITORY_PASSWORD" \
              --arg imageTag "${CAMPUX_IMAGE_TAG}" \
              --argjson existingEnv "$existing_env" \
              '{
                env: (
                  ($existingEnv | map(select(.name != "CAMPUX_IMAGE_TAG")))
                  + [{"name": "CAMPUX_IMAGE_TAG", "value": $imageTag}]
                ),
                prune: false,
                pullImage: true,
                repositoryAuthentication: true,
                repositoryUsername: $repositoryUsername,
                repositoryPassword: $repositoryPassword,
                repositoryReferenceName: "refs/heads/main"
              }'
          )"

          # 使用 Portainer 旧版 Git redeploy API
          # PUT /api/stacks/{id}/git/redeploy?endpointId={endpoint_id}
          echo "--- Redeploying stack via Portainer API ---" >&2
          redeploy_url="$portainer_url/api/stacks/$stack_id/git/redeploy?endpointId=$endpoint_id"
          redeploy_response="$(curl -sS -w '\n%{http_code}' \
            -X PUT "$redeploy_url" \
            -H "Authorization: Bearer $jwt" \
            -H 'Content-Type: application/json' \
            --data-binary "$redeploy_payload" 2>&1)"
          redeploy_http_code="$(printf '%s' "$redeploy_response" | tail -1)"
          redeploy_body="$(printf '%s' "$redeploy_response" | sed '$d')"
          if [ "$redeploy_http_code" = "200" ]; then
            echo "Redeploy succeeded (HTTP $redeploy_http_code)" >&2
          else
            echo "Redeploy failed (HTTP $redeploy_http_code): $redeploy_body" >&2
            exit 1
          fi

      - name: Check production health
        run: |
          curl -fsS --retry 30 --retry-delay 10 --retry-all-errors \
            https://admin.campux.top/api/health

  deploy-docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy/prod'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check docs changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            before="HEAD^"
          fi
          if git diff --quiet "$before" "$GITHUB_SHA" -- docs package.json bun.lock; then
            echo "docs=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.changes.outputs.docs == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        if: steps.changes.outputs.docs == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.changes.outputs.docs == 'true'
        run: bun install --frozen-lockfile

      - name: Build docs
        if: steps.changes.outputs.docs == 'true'
        run: bun run docs:build

      - name: Deploy docs to Cloudflare Pages
        if: steps.changes.outputs.docs == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler pages deploy docs/.vitepress/dist \
            --project-name campux \
            --branch main
