name: Docker Image

on:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  build:
    name: Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Docker tag
        id: meta
        shell: bash
        run: |
          raw_tag="${GITHUB_REF_NAME}"
          tag="$(printf '%s' "$raw_tag" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9_.-]+/-/g; s/^-+//; s/-+$//' \
            | cut -c1-128)"
          if [ -z "$tag" ]; then
            tag="${GITHUB_SHA::12}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "image=rockchin/campux:$tag" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push branch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/deploy/prod'
    steps:
      - name: Redeploy production stack
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_USERNAME: ${{ secrets.PORTAINER_USERNAME }}
          PORTAINER_PASSWORD: ${{ secrets.PORTAINER_PASSWORD }}
          PORTAINER_STACK_ID: ${{ secrets.PORTAINER_STACK_ID }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
          PORTAINER_REPOSITORY_USERNAME: ${{ secrets.PORTAINER_REPOSITORY_USERNAME }}
          PORTAINER_REPOSITORY_PASSWORD: ${{ secrets.PORTAINER_REPOSITORY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail

          : "${PORTAINER_URL:?PORTAINER_URL secret is required}"
          : "${PORTAINER_USERNAME:?PORTAINER_USERNAME secret is required}"
          : "${PORTAINER_PASSWORD:?PORTAINER_PASSWORD secret is required}"
          : "${PORTAINER_REPOSITORY_USERNAME:?PORTAINER_REPOSITORY_USERNAME secret is required}"
          : "${PORTAINER_REPOSITORY_PASSWORD:?PORTAINER_REPOSITORY_PASSWORD secret is required}"

          stack_id="${PORTAINER_STACK_ID:-96}"
          endpoint_id="${PORTAINER_ENDPOINT_ID:-10}"
          portainer_url="${PORTAINER_URL%/}"

          jwt="$(
            jq -n \
              --arg username "$PORTAINER_USERNAME" \
              --arg password "$PORTAINER_PASSWORD" \
              '{Username: $username, Password: $password}' \
            | curl -fsS \
                -X POST "$portainer_url/api/auth" \
                -H 'Content-Type: application/json' \
                --data-binary @- \
            | jq -r '.jwt'
          )"

          if [ -z "$jwt" ] || [ "$jwt" = "null" ]; then
            echo "Failed to authenticate to Portainer" >&2
            exit 1
          fi

          jq -n \
            --arg repositoryUsername "$PORTAINER_REPOSITORY_USERNAME" \
            --arg repositoryPassword "$PORTAINER_REPOSITORY_PASSWORD" \
            '{
              env: [],
              prune: false,
              pullImage: true,
              repositoryAuthentication: true,
              repositoryUsername: $repositoryUsername,
              repositoryPassword: $repositoryPassword,
              repositoryReferenceName: "refs/heads/main"
            }' \
          | curl -fsS \
              -X PUT "$portainer_url/api/stacks/$stack_id/git/redeploy?endpointId=$endpoint_id" \
              -H "Authorization: Bearer $jwt" \
              -H 'Content-Type: application/json' \
              --data-binary @-

      - name: Check production health
        run: |
          curl -fsS --retry 12 --retry-delay 5 --retry-all-errors \
            https://admin.campux.top/api/health

  deploy-docs:
    name: Deploy Docs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/deploy/prod'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check docs changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            before="HEAD^"
          fi
          if git diff --quiet "$before" "$GITHUB_SHA" -- docs package.json bun.lock; then
            echo "docs=false" >> "$GITHUB_OUTPUT"
          else
            echo "docs=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.changes.outputs.docs == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        if: steps.changes.outputs.docs == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.changes.outputs.docs == 'true'
        run: bun install --frozen-lockfile

      - name: Build docs
        if: steps.changes.outputs.docs == 'true'
        run: bun run docs:build

      - name: Deploy docs to Cloudflare Pages
        if: steps.changes.outputs.docs == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler pages deploy docs/.vitepress/dist \
            --project-name campux \
            --branch deploy/prod
