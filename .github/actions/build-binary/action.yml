name: Build Campux standalone binary
description: 构建并上传某平台的 Campux 单可执行文件（含可选 smoke test）

inputs:
  target:
    description: "目标标识，如 linux-x64 / darwin-arm64 / windows-x64"
    required: true
  version:
    description: "版本号（如 v1.2.3）"
    required: true

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.12

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile

    - name: Build standalone binary
      shell: bash
      env:
        CAMPUX_BUILD_VERSION: ${{ inputs.version }}
      run: bun run scripts/build-release.ts --version "${{ inputs.version }}" --out release

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: campux-${{ inputs.target }}
        path: |
          release/campux-${{ inputs.target }}*
        if-no-files-found: error
        retention-days: 7

    - name: Smoke test (binary boots on default SQLite + serves health)
      # 仅在 Unix 平台跑（bash 后台进程方式）；放在产物上传之后，即便这步因环境差异
      # 失败，已构建/上传的二进制也不受影响。
      # 用「默认零依赖形态」(SQLite + 本地存储) 实跑：不配 DATABASE_URL/S3，期望二进制
      # 自建 SQLite 库、跑内嵌 baseline、起 server 并对 /api/health 返回 200——这是对
      # 「单文件零外部依赖」最强的端到端校验。
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set +e
        bin="./release/campux-${{ inputs.target }}"
        workdir="$(mktemp -d)"
        CAMPUX_DATA_DIR="$workdir/data" \
          CAMPUX_BOT_SESSION_SECRET=ci-smoke-secret \
          CAMPUX_SERVER_PORT=18999 \
          "$bin" > smoke.log 2>&1 &
        pid=$!
        ok=""
        for i in $(seq 1 30); do
          code="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18999/api/health 2>/dev/null)"
          if [ "$code" = "200" ]; then ok="1"; break; fi
          sleep 1
        done
        kill "$pid" 2>/dev/null
        wait "$pid" 2>/dev/null
        echo "---- smoke.log ----"
        head -60 smoke.log
        if [ -n "$ok" ] && [ -f "$workdir/data/campux.db" ]; then
          echo "SMOKE_OK (health 200 + sqlite db created)"
        else
          echo "SMOKE_FAIL"
          exit 1
        fi
